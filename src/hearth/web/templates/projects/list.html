{% extends "base.html" %}
{% block title %}Projects — Hearth{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Projects</h1>
</div>

<div class="card mb-4">
    <h3 style="margin-bottom: 16px;">New Project</h3>
    <form hx-post="/projects" hx-target="#project-table" hx-swap="innerHTML">
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 14px; margin-bottom: 14px;">
            <div class="form-group" style="margin-bottom: 0;">
                <label for="name">Name</label>
                <input type="text" name="name" id="name" placeholder="project-name" required>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label for="description">Description</label>
                <input type="text" name="description" id="description" placeholder="Optional description">
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Create Project</button>
    </form>
</div>

<div id="project-table">
    {% include "projects/_table.html" %}
</div>
{% endblock %}
